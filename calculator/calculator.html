<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="calculator.css">
    <title>Calculator</title>
  </head>
  <body>
    <div class="calculator-body">
      <p class="js-calculation calculation"></p>

      <p>
        <button class="white-btn" onclick="updateCalculation('1')">1</button>

        <button class="white-btn" onclick="updateCalculation('2')">2</button>

        <button class="white-btn" onclick="updateCalculation('3')">3</button>

        <button class="pink-btn" onclick="updateCalculation(' + ')">+</button>
      </p>

      <p>
        <button class="white-btn" onclick="updateCalculation('4')">4</button>

        <button class="white-btn" onclick="updateCalculation('5')">5</button>

        <button class="white-btn" onclick="updateCalculation('6')">6</button>

        <button class="pink-btn" onclick="updateCalculation(' - ')">-</button>
      </p>

      <p>
        <button class="white-btn" onclick="updateCalculation('7')">7</button>

        <button class="white-btn" onclick="updateCalculation('8')">8</button>

        <button class="white-btn" onclick="updateCalculation('9')">9</button>

        <button class="pink-btn" onclick="updateCalculation(' * ')">*</button>
      </p>

      <p>
        <button class="white-btn" onclick="updateCalculation('0')">0</button>

        <button class="white-btn" onclick="updateCalculation('.')">.</button>

        <button class="equal-btn" onclick="evaluation()">=
        </button>

        <button class="pink-btn" onclick="updateCalculation(' / ')">/</button>
      </p>

      <p>
        <button class="white-btn clear-btn" onclick="clearCalculation()">C
        </button>
      </p>

    </div>

    <script src="calculator.js"></script>
  </body>
</html>
