<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width initial-scale=1" />
		<title>Cart</title>
	</head>
	<body>
    <button onclick="
      console.log(`Cart quantity: ${cartQuantity}`);
    "> Show quantity </button>
    
    <button onclick=" updateCartQuantity(1)
    "> Add to cart </button>

    <button onclick="updateCartQuantity(2)
    "> +2 </button>

    <button onclick="updateCartQuantity(3)
    "> +3 </button> 

    <button onclick="updateCartQuantity(4)
    "> +4 </button> 

    <button onclick="updateCartQuantity(5)
    "> +5 </button> 

    <button onclick="updateCartQuantity(-1)
    "> -1 </button> 

    <button onclick="updateCartQuantity(-2)
    "> -2 </button> 

    <button onclick="updateCartQuantity(-3)
    "> -3 </button> 

    <button onclick="
      cartQuantity = 0;
      console.log('Cart was reset.')
      console.log(`Cart quantity: ${cartQuantity}`);
    "> Reset cart </button> 

    <p class="js-quantity-display"></p>

    <script>
      let cartQuantity = 0;
      displayQuantity()

      function updateCartQuantity (change) {
        if (cartQuantity + change > 10) {
          alert('The cart is full');
          return;
        }

        if (cartQuantity + change < 0) {
          alert('The cart is empty');
          return;
        }

        cartQuantity += change;
        displayQuantity()
      }

      function displayQuantity() {
        document.querySelector('.js-quantity-display').innerHTML = `Cart quantity: ${cartQuantity}`;
      }
    </script>
	</body>
</html>
