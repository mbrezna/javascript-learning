<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width initial-scale=1" />
		<title>Cart</title>
	</head>
	<body>
    <button onclick="
        console.log(`Cart quantity: ${cartQuantity}`);
    "> Show quantity </button>
    
    <button onclick="
      cartQuantity = cartQuantity + 1;
      console.log(`Cart quantity: ${cartQuantity}`);
    "> Add to cart </button>

    <button onclick="
      cartQuantity = cartQuantity + 2;
      console.log(`Cart quantity: ${cartQuantity}`);
    "> +2 </button>

    <button onclick="
      cartQuantity = cartQuantity + 3;
      console.log(`Cart quantity: ${cartQuantity}`);
    "> +3 </button> 

    <button onclick="
      cartQuantity += 4;
      console.log(`Cart quantity: ${cartQuantity}`);
    "> +4 </button> 

    <button onclick="
      cartQuantity += 5;
      console.log(`Cart quantity: ${cartQuantity}`);
    "> +5 </button> 

    <button onclick="
      cartQuantity --;
      console.log('The item was removed.')
      console.log(`Cart quantity: ${cartQuantity}`);
    "> -1 </button> 

    <button onclick="
      cartQuantity -= 2;
      console.log('The item was removed.')
      console.log(`Cart quantity: ${cartQuantity}`);
    "> -2 </button> 

    <button onclick="
      cartQuantity -= 3;
      console.log('The item was removed.')
      console.log(`Cart quantity: ${cartQuantity}`);
    "> -3 </button> 

    <button onclick="
      cartQuantity = 0;
      console.log('Cart was reset.')
      console.log(`Cart quantity: ${cartQuantity}`);
    "> Reset cart </button> 

    <script>
      let cartQuantity = 0;
      const name = "Matěj Března";
      console.log(`My name is: ${name}`);

      let cost = 5 + 2 * 3 + 9;
      console.log(`Cost of the food: $${cost}`);
      let afterTax = cost - cost * 0.1;
      console.log(`Total cost: $${afterTax}`);
    </script>
	</body>
</html>
