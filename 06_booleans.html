<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booleans</title>
</head>
<body>
    <script>
        console.log(3 < 5);
        console.log(typeof true);
        console.log(5 === '5.00');

        if (false) {
            console.log(`hello`);
        } else {
            console.log('else')
        };

        const age = prompt('Zadejte věk');
        if (age >= 18) {
            console.log('You can drive!')
        } else if (age = 17) {
            console.log('Almost there!')
        } else {
            console.log('You can not drive!')
        };

        console.log(0.2 >= 0 && 0.2 < 1 / 3);
        console.log (true || false);
        console.log (!true)

        if (5) {
            console.log('truthy')
        }

        //truthy and falsy values
        const cartQuantity = 5
        if (cartQuantity) {
            console.lof('cart has produts')
        }

        console.log(!0);
        console.log('text' / 5);

        let variable1;
        console.log(variable1);
        
        
        //Ternary operator
        const result = 0 ? '...' : 'falsy'
        console.log(result);

        //Guard operator  
        true && console.log('hello');

        const message = 56 && 'hello2';
        console.log(message);

        //default operator
        const currency = 'EUR' || 'USD';
        console.log(currency);

        const hour = 16;
        const name = 'Matěj'
        if (hour >= 6 && hour <= 12) {
            console.log(`Good morning ${name}`)
        } else if (hour >= 13 && hour <= 17) {
            console.log(`Good afternoon ${name}`)
        } else {
            console.log(`Good night ${name}`)
        }

        const age = 5;
        const holiday = true;
        if ((age <= 6 || age >= 65) && !holiday) {
            console.log('You have a discount')
        } else {
            console.log('No discount')
        }
    </script>
</body>
</html>
