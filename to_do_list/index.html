<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To do list</title>
    <link rel="stylesheet" href="to_do_list.css">
  </head>
  <body>
    <h1>To do list</h1>
    <div class="todo-input-grid">
      <input class="js-name-input name-input" placeholder="What to do?">
      <input type="date" class="due-date-input js-due-date-input">
      <button class="add-task-button js-add-task-button">Add</button>
    </div>

    <h3>Tasks:</h2>
    <div class="js-todo-list todo-grid"></div>

    <script src="to_do_list.js"></script>
  </body>
</html>
