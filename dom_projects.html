<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM projects</title>
  </head>
  <body>
    <p>Youtube subscribe button</p>
    <button onclick="subscribe()" class="js-subscribe-button">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of order"    class="js-cost-input" onkeydown="handleCostKeydown()">
    <button onclick="calculateShipping(event)">Calculate</button>
    <p class="js-total-cost"></p>

    <p>Typer</p>
    <input onkeyup="typerOnkeyup()" class="js-input">
    <p class="js-typer"></p>
    <script>
      function subscribe() {
        const buttonElem = document.querySelector(".js-subscribe-button");

        if (buttonElem.innerText === "Subscribe") {
          buttonElem.innerHTML = "Subscribed";
        } else {
          buttonElem.innerHTML = "Subscribe";
        }
      }

      function calculateShipping() {
        const inputElem = document.querySelector('.js-cost-input');
        let cost = Number(inputElem.value) * 100;

        if (cost < 4000) {
          cost = cost + 1000;
        }

        document.querySelector('.js-total-cost')
          .innerHTML = `$${cost / 100}`;
      }

      function handleCostKeydown(event) {
        if (event.key === 'Enter') {
          calculateShipping();
        }
      }

      function typerOnkeyup() {
        const inputElem = document.querySelector('.js-input');
        document.querySelector('.js-typer').innerHTML = inputElem.value;
      }

    </script>
  </body>
</html>
