<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM projects</title>
    <style>
      body {
        font-family: Arial;
      }
      .subscribe-button {
        border: none;
        background-color: black;
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        margin-bottom: 30px;
      }

      .is-subscribed {
        background-color: rgb(240, 240, 240);
        color: black;
      }

      .cost-input {
        font-size: 15px;
        padding: 10px;
      }

      .calculate-button {
        background-color: green;
        color: white;
        border: none;
        padding: 12px 15px;
        font-size: 15px;
        cursor: pointer;
        border-radius: 4px;
      }

      .warning {
        color: red;
      }

      .free {
        color: green;
      }
    </style>
  </head>
  <body>
    <p>Youtube subscribe button</p>
    <button onclick="subscribe()" class="js-subscribe-button subscribe-button">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of order"    class="js-cost-input cost-input" onkeydown="handleCostKeydown()">
    <button class="calculate-button" onclick="calculateShipping(event)">Calculate</button>
    <p class="js-total-cost"></p>

    <p>Typer</p>
    <input onkeyup="typerOnkeyup()" class="js-input">
    <p class="js-typer"></p>
    <script>
      function subscribe() {
        const buttonElem = document.querySelector(".js-subscribe-button");

        if (buttonElem.innerText === "Subscribe") {
          buttonElem.innerHTML = "Subscribed";
          buttonElem.classList.add('is-subscribed');
        } else {
          buttonElem.innerHTML = "Subscribe";
          buttonElem.classList.remove('is-subscribed');
        }
      }

      function calculateShipping() {
        const inputElem = document.querySelector('.js-cost-input');
        let cost = Number(inputElem.value) * 100;

        const message = document.querySelector('.js-total-cost')
        message.innerHTML = '';
        
        if (cost < 0) {
          message.innerHTML = `Error: cost cannot be less then $0`
          message.classList.add('warning');
          return;
        } else if (cost < 4000) {
          cost = cost + 1000;
          message.innerHTML = `Shipping: 10$,
          Price: $${cost / 100}`;
          return;
        } else {
          message.innerHTML = 'Free shipping';
          message.classList.add('free');
        }
      }

      function handleCostKeydown(event) {
        if (event.key === 'Enter') {
          calculateShipping();
        }
      }

      function typerOnkeyup() {
        const inputElem = document.querySelector('.js-input');
        document.querySelector('.js-typer').innerHTML = inputElem.value;
      }

    </script>
  </body>
</html>
