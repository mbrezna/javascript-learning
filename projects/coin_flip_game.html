<!doctype html>
<html lang="en">
  <head>
    <title>Heads and Tails</title>
  </head>
  <body>
    <h1>Heads and tails game</h1>
    <button onclick="playGame('heads')">HEADS</button>
    <button onclick="playGame('tails')">TAILS</button>
    <p class="js-choice">Heads or Tails??</p>
    <p class="js-result">It's 50 / 50</p>
    <p class="js-score"></p>
    <button
      onclick="resetScore();
      ">
      RESET SCORE
    </button>
    <script>
      const score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
      };

      displayScore();

      function playGame(guess) {
        const randomNumber = Math.random();
        const result = randomNumber < 0.5 ? "heads" : "tails";

        if (guess === result) {
          score.wins++;
          document.querySelector('.js-result').innerHTML = `It's a ${result}. You win!`;
        } else {
          score.losses++;
          document.querySelector('.js-result').innerHTML = `It's a ${result}. You lose.`;
        }

        localStorage.setItem("score", JSON.stringify(score));

        document.querySelector('.js-choice').innerHTML = `You vote for ${guess}.`
        
        displayScore();
      }

      function displayScore() {
        document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}`;
      }

      function resetScore() {
        score.wins = 0;
        score.losses = 0;
        localStorage.removeItem('score');
        displayScore();
      }
    </script>
  </body>
</html>
