<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width initial-scale=1" />
    <title>Rock Paper Scissors!</title>
    <link rel="stylesheet" href="rock_paper_scissors.css">
  </head>
  <body>
    <h1 class="heading">Rock Paper Scissors!</h1>

    <!--ROCK-->
    <button class="move-button js-rock-button">
        <img class="move-icon" src="../../images/rock-emoji.png">
    </button>

    <!--PAPER-->
    <button class="move-button js-paper-button">
        <img class="move-icon" src="../../images/paper-emoji.png">
    </button>

    <!--SCISSORS-->
    <button class="move-button js-scissors-button">
        <img class="move-icon" src="../../images/scissors-emoji.png">
    </button>

    <p class="js-result result">Pick your move</p>

    <p class="js-moves"></p>

    <p class="js-score score"></p>

    <button class="js-reset-button reset-button">Reset score
    </button>

    <button class="js-auto-play-button auto-play-button">Auto Play
    </button>

    <p class="js-confirmation-message score"></p>

    <script src="rock_paper_scissors.js"></script>

    <p class = "info">Press 'r' to play the game with rock</p>
    <p class = "info">'p' with paper</p>
    <p class = "info">'s' with scissors</p>
    <p class = "info">'a' for Autoplay</p>
    <p class = "info">'Backspace' for score reset</p>
  </body>
</html>
