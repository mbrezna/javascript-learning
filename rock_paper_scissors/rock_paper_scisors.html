<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width initial-scale=1" />
    <title>Rock Paper Scissors!</title>
    <link rel="stylesheet" href="rock_paper_scissors.css">
  </head>
  <body>
    <h1 class="heading">Rock Paper Scissors!</h1>

    <!--ROCK-->
    <button class="move-button" onclick="playGame('rock')">
        <img class="move-icon" src="../images/rock-emoji.png">
    </button>

    <!--PAPER-->
    <button class="move-button" onclick="playGame('paper')">
        <img class="move-icon" src="../images/paper-emoji.png">
    </button>

    <!--SCISSORS-->
    <button class="move-button" onclick="playGame('scissors')">
        <img class="move-icon" src="../images/scissors-emoji.png">
    </button>

    <p class="js-result result">Pick your move</p>

    <p class="js-moves"></p>

    <p class="js-score score"></p>

    <button class="reset-button"
      onclick="resetScore()">Reset score
    </button>
    <script src="rock_paper_scissors.js"></script>
  </body>
</html>
