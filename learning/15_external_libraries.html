<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Messenger
    </title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/dayjs.min.js">
    </script>
      
    <script>
      const fiveDaysAfter = dayjs().add(5, 'days').format('MMMM DD');
      console.log(fiveDaysAfter);

      const oneMonthAfter = dayjs().add(1, 'month').format('D. M. YYYY');
      console.log(oneMonthAfter);

      const twoMonthsAfter = dayjs().add(2, 'month').format('ddd DD/MM/YY');
      console.log(twoMonthsAfter);

      const oneMonthBefore = dayjs().subtract(1, 'month').format('D. M. YYYY');
      console.log(oneMonthBefore);

      function isWeekend() {
        if (dayjs().format('ddd') === 'Sat') {
          return 'Saturday';
        } else if (dayjs().format('ddd') === 'Sun') {
          return 'Sunday';
        }
      }
    </script>
  </body>
</html>
