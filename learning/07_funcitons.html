      function greet(name) {
        if (!name) {
          console.log("Hi there!");
        } else {
          console.log(`Hello ${name}!`);
        }
      }
      greet("Matej");
      greet("Simon");
      greet("Veronika");
      greet();

      //TEMPERATURE CONVERSION
      function convertToFahrenheit(celsius) {
        return (celsius * 9) / 5 + 32;
      }

      function convertToCelsius(fahrenheit) {
        return ((fahrenheit - 32) * 5) / 9;
      }

      function convertTemperature(number, unit) {
        if (unit === "C") {
          const fahrenheit = convertToFahrenheit(number);
          return `${fahrenheit} °F`;
        } else if (unit === "F") {
          const celsius = convertToCelsius(number);
          return `${celsius} °C`;
        }
      }

      console.log(convertTemperature(32, "C"));
      console.log(convertTemperature(32, "F"));

      //LENGTH CONVERSION
      function convertLength(number, from, to) {
        if (from === "miles" && to === "km") {
          return `${number * 1.6} ${to}`;
        } else if (from === "km" && to === "miles") {
          return `${number / 1.6} ${to}`;
        } else if (from === to) {
          return `${number} ${to}`;
        } else if (from === "km" && to === "ft") {
          return `${number * 3281} ${to}`;
        } else if (from === "ft" && to === "km") {
          return `${number / 3281} ${to}`;
        } else if (from === "ft" && to === "miles") {
          return `${number / 5280} ${to}`;
        } else if (from === "miles" && to === "ft") {
          return `${number * 5280} ${to}`;
        } else if (from !== "km" && from !== "miles" && from !== "ft") {
          return `Invalid unit: ${from}`;
        } else if (to !== "km" && to !== "miles" && to !== "ft") {
          return `Invalid unit: ${to}`;
        }
      }

      //testing...
      console.log(convertLength(10, "km", "miles"));
      console.log(convertLength(10, "miles", "km"));

      console.log(convertLength(50, "miles", "km"));
      console.log(convertLength(32, "km", "miles"));
      console.log(convertLength(50, "km", "km"));

      console.log(convertLength(5, "miles", "ft"));
      console.log(convertLength(5, "km", "ft"));
